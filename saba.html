    <style>
        /* Starry Background */
        .star-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        body { background-color: #090A0F; min-height: 100vh; 
            font-family: 'Tajawal', sans-serif;
            background-color: #090A0F;
        }

        .premium-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-gradient {
            background: radial-gradient(circle at 50% 50%, rgb(196, 13, 116) 0%, #000000 100%);
        }

        .aura-glow {
            position: absolute;
            width: min(600px, 90vw);
            height: min(600px, 90vw);
            background: radial-gradient(circle, rgba(196, 13, 116, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: auraMove 20s infinite alternate;
        }

        @keyframes auraMove {
            0% {
                transform: translate(-20%, -20%) scale(1);
            }

            100% {
                transform: translate(20%, 20%) scale(1.2);
            }
        }

        .text-shimmer {
            background: linear-gradient(90deg, #fff, rgb(196, 13, 116), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 4s linear infinite;
        }

        /* Fluid Typography & Spacing */
        :root {
            --section-py: clamp(4rem, 10vw, 8rem);
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
        }

        h2 {
            font-size: clamp(1.75rem, 6vw, 4rem);
        }

        h3 {
            font-size: clamp(1.25rem, 4vw, 2.5rem);
        }

        .py-responsive {
            padding-top: var(--section-py);
            padding-bottom: var(--section-py);
        }

        .premium-counter {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(196, 13, 116, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .text-extreme-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 40px rgba(196, 13, 116, 0.8), 0 0 60px rgba(196, 13, 116, 0.6);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .result-heart {
            color: rgb(196, 13, 116);
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(196, 13, 116, 0.6));
            transform: scale(1.1);
            margin: 0 5px;
        }

        .premium-counter:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 60px rgba(196, 13, 116, 0.25);
            transform: translateY(-5px);
        }

        .numeric-flip {
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        .flip-change {
            transform: translateY(-10px) rotateX(20deg);
            opacity: 0.2;
        }

        .glow-soft {
            text-shadow: 0 0 20px rgba(196, 13, 116, 0.4);
        }

        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }

        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right,
                    transparent,
                    rgba(255, 255, 255, 0.1),
                    transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-in forwards;
            opacity: 0;
        }

        .animate-slide-up {
            animation: slideUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: rgb(196, 13, 116);
            border-radius: 4px;
        }

        /* 3D Carousel */
        .carousel-container {
            perspective: 1000px;
            overflow: visible;
        }

        .carousel {
            width: 100%;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            animation: spin 20s infinite linear;
        }

        @media (max-width: 768px) {
            .carousel {
                height: 250px;
            }
        }

        .carousel:hover {
            animation-play-state: paused;
        }

        .carousel-item {
            position: absolute;
            width: 180px;
            height: 270px;
            left: 50%;
            top: 50%;
            transform-origin: center;
            transform: translate(-50%, -50%) rotateY(var(--i)) translateZ(350px);
            transition: transform 0.5s, box-shadow 0.5s;
            -webkit-box-reflect: below 10px linear-gradient(transparent, transparent, #0005);
        }

        @media (max-width: 768px) {
            .carousel-item {
                width: 120px;
                height: 180px;
                transform: translate(-50%, -50%) rotateY(var(--i)) translateZ(200px);
            }
        }

        @keyframes spin {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            animation: burst 1s ease-out forwards;
            z-index: 9999;
        }

        @keyframes burst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Cursor Trail */
        .trail-heart {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: fadeUp 1s ease-out forwards;
            z-index: 9999;
        }

        @keyframes fadeUp {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -150%) scale(0.5);
                opacity: 0;
            }
        }

        /* Camera Viewfinder Overlay */
        .camera-overlay {
            pointer-events: none;
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            z-index: 50;
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background-color: rgb(196, 13, 116);
            border-radius: 50%;
            animation: pulse-slow 1s infinite;
        }

        .corner-tl,
        .corner-tr,
        .corner-bl,
        .corner-br {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid white;
        }

        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        /* Film Strip Style for Carousel Items */
        .film-border {
            background-color: rgb(196, 13, 116);
            padding: 15px 5px;
            /* Vertical padding simulates film sprockets */
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Heart Crush Game - Premium Visuals */
        .heart-crush-container {
            perspective: 1000px;
        }

        .main-heart {
            font-size: 10rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            filter: drop-shadow(0 0 20px rgba(209, 12, 127, 0.5));
            display: inline-block;
            position: relative;
        }

        .main-heart:active {
            transform: scale(0.9) rotate(-5deg);
        }

        .heart-shake {
            animation: heartShake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes heartShake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0) rotate(-2deg);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0) rotate(3deg);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-6px, 0, 0) rotate(-4deg);
            }

            40%,
            60% {
                transform: translate3d(6px, 0, 0) rotate(4deg);
            }
        }

        .heart-cracked {
            position: relative;
        }

        .heart-cracked::after {
            content: '⚡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            filter: blur(1px);
        }

        .final-heart-glow {
            font-size: 12rem;
            color: #ff4db1;
            filter: drop-shadow(0 0 50px rgba(255, 77, 177, 0.9)) drop-shadow(0 0 100px rgba(255, 77, 177, 0.4));
            animation: finalHeartFloat 3s infinite ease-in-out, finalHeartGlowPulse 2s infinite ease-in-out;
            cursor: pointer;
            z-index: 10002;
        }

        @keyframes finalHeartFloat {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        @keyframes finalHeartGlowPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 50px rgba(255, 77, 177, 0.9));
            }

            50% {
                filter: drop-shadow(0 0 80px rgba(255, 77, 177, 1)) brightness(1.2);
            }
        }

        .shatter-particle {
            position: absolute;
            pointer-events: none;
            animation: shatter 1s ease-out forwards;
        }

        @keyframes shatter {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr));
                opacity: 0;
            }
        }

        .click-hint {
            animation: hintPulse 1.5s infinite;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            margin-top: 2rem;
        }

        @keyframes hintPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .game-overlay {
            background: radial-gradient(circle, rgba(30, 0, 15, 0.98) 0%, rgba(0, 0, 0, 1) 100%);
        }

        @keyframes floating-heart {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translateY(-20vh) scale(1.5);
                opacity: 0;
            }
        }

        .flying-heart {
            position: absolute;
            cursor: pointer;
            z-index: 50;
            animation: floating-heart 4s linear forwards;
            filter: drop-shadow(0 0 10px rgba(131, 11, 157, 0.5));
            transition: transform 0.2s;
        }

        .flying-heart:hover {
            transform: scale(1.4);
        }

        @keyframes extreme-glow {

            0%,
            100% {
                filter: brightness(1) drop-shadow(0 0 10px white);
            }

            50% {
                filter: brightness(2) drop-shadow(0 0 30px white) drop-shadow(0 0 50px rgb(196, 13, 116));
            }
        }

        .text-extreme-glow {
            animation: extreme-glow 1.5s infinite ease-in-out;
        }

        .flash-effect {
            animation: screen-flash 0.5s ease-out forwards;
        }

        @keyframes screen-flash {
            0% {
                background: white;
                opacity: 0.8;
            }

            100% {
                background: transparent;
                opacity: 0;
            }
        }

        /* Premium Envelope Styling */
        .envelope-container {
            position: relative;
            width: min(320px, 90vw);
            height: min(210px, 60vw);
            margin: auto;
            cursor: pointer;
            perspective: 1500px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .envelope-container:hover {
            transform: scale(1.05) rotateX(10deg);
        }

        .envelope-container.is-growing {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            z-index: 200;
            cursor: default;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgb(196, 13, 116);
            /* Premium Magenta Body */
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .is-growing .envelope-wrapper {
            background: transparent;
            box-shadow: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: calc(min(300px, 85vw) / 2) solid transparent;
            border-right: calc(min(300px, 85vw) / 2) solid transparent;
            border-top: calc(min(200px, 55vw) * 0.55) solid rgb(196, 13, 116);
            z-index: 50;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.2));
        }

        .envelope-open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 10;
        }

        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            border-left: calc(min(300px, 85vw) / 2) solid transparent;
            border-right: calc(min(300px, 85vw) / 2) solid transparent;
            border-bottom: calc(min(200px, 55vw) * 0.55) solid rgb(150, 10, 88);
            bottom: 0;
            z-index: 40;
        }

        .envelope-sides {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgb(196, 13, 116);
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
            z-index: 35;
        }

        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(60px, 18vw);
            height: min(60px, 18vw);
            background: linear-gradient(135deg, #111827 0%, rgb(46, 0, 27) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.2);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wax-seal svg {
            color: #fecaca;
            width: 30px;
            height: 30px;
        }

        .envelope-open .wax-seal {
            opacity: 0;
            transform: translate(-50%, -60%) scale(1.5);
            pointer-events: none;
        }

        .letter-paper {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 180px;
            background: #fdfcf0;
            /* Ivory/Cream Paper */
            border-radius: 2px;
            z-index: 20;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .envelope-open .letter-paper {
            transform: translateX(-50%) translateY(-100px);
            height: 220px;
        }

        .is-growing .letter-paper {
            width: 95%;
            max-width: 800px;
            height: 85vh;
            bottom: 50%;
            transform: translate(-50%, 50%);
            border-radius: 20px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            z-index: 300;
        }

        .letter-scroll-content {
            opacity: 0;
            transition: opacity 0.5s ease 0.8s;
        }

        .is-growing .letter-scroll-content {
            opacity: 1;
        }

        .letter-content {
            font-family: 'Dancing Script', cursive;
            color: #4b2c20;
            text-align: center;
            font-size: clamp(1rem, 4vw, 1.5rem);
            line-height: 1.6;
        }

        /* Modal specific refinements */
        .premium-letter-modal {
            background-color: #fff9ea;
            background-image: radial-gradient(#e2d2b5 1px, transparent 1px);
            background-size: 20px 20px;
            border: 2px solid #e2d2b5;
            position: relative;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5), inset 0 0 150px rgba(226, 210, 181, 0.3);
        }

        .letter-border {
            position: absolute;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 1px solid rgb(196, 13, 116);
            opacity: 0.1;
            pointer-events: none;
        }

        /* Fancy Letter Typography */
        .fancy-letter span:last-child {
            font-size: 1.6em;
            color: rgb(196, 13, 116);
            vertical-align: bottom;
            font-family: 'Dancing Script', cursive;
        }

        .film-border::before,
        .film-border::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background-image: linear-gradient(to right, white 50%, transparent 50%);
            background-size: 20px 100%;
            opacity: 0.3;
        }

        .film-border::before {
            top: 5px;
        }

        .film-border::after {
            bottom: 5px;
        }

        .pulse-active {
            animation: aura-pulse 4s ease-in-out infinite alternate !important;
        }

        @keyframes aura-pulse {
            0% {
                transform: scale(1);
                opacity: 0.3;
            }

            100% {
                transform: scale(1.2);
                opacity: 0.6;
            }
        }

        .secret-overlay {
            position: fixed;

                setConnectedCount(0);
                setGameOver(false);

            const connectStar = (id) => {
                const star = activeStars.find(s => s.id === id);
                if (star.connected) return;

                setActiveStars(prev => prev.map(s => s.id === id ? { ...s, connected: true } : s));
                setConnectedCount(prev => prev + 1);

                if (connectedCount + 1 === totalStars) {

        function useParticleSystem() {
            useEffect(() => {
                const createParticle = (x, y) => {
                    const colors = ['rgb(196, 13, 116)', '#D4AF37', '#fecdd3', '#ff85cc', '#ffb3e0', '#ff66c4'];
                    const emojis = ['💖', '✨', '🌸', '✨'];

                        particle.style.left = x + 'px';
                        particle.style.top = y + 'px';
                        particle.style.color = colors[Math.floor(Math.random() * colors.length)];

                        document.body.appendChild(particle);
                        setTimeout(() => particle.remove(), 1000);
                    }
                };
                const handleTouch = (e) => {
                    [...e.touches].forEach(t => createParticle(t.clientX, t.clientY));

                window.addEventListener('touchmove', handleTouch);

                return () => {

                    window.removeEventListener('mousedown', handleClick);
                };
            }, []);

        const FancyText = ({ text }) => {
            const [displayText, setDisplayText] = useState("");
            const [index, setIndex] = useState(0);
            const charArray = useRef([]);
            const containerRef = useRef(null);

            useEffect(() => {
                charArray.current = Array.from(text);
                setDisplayText("");
                setIndex(0);
            }, [text]);

            useEffect(() => {
                if (index < charArray.current.length) {
                    const timeout = setTimeout(() => {
                        setDisplayText(prev => prev + charArray.current[index]);
                        setIndex(prev => prev + 1);
                    }, 25);
                    return () => clearTimeout(timeout);
                }
            }, [index]);

            useEffect(() => {
                if (containerRef.current) {
                    const scrollContainer = containerRef.current.closest('.overflow-y-auto');
                    if (scrollContainer) {
                        scrollContainer.scrollTop = scrollContainer.scrollHeight;
                    }
                }
            }, [displayText]);

            return (
                <div ref={containerRef} className="leading-relaxed text-gray-800 text-right text-xl md:text-2xl font-medium whitespace-pre-wrap pb-10" style={{ direction: 'rtl', minHeight: '1.5em' }}>

        const RelationshipClock = ({ startDate, title, subtitle, t, format = 'full' }) => {
            const [time, setTime] = useState({});

            useEffect(() => {
                const calculate = () => {
                    const now = new Date();
                    const start = new Date(startDate);
                    const diffMs = now - start;

                    if (format === 'days') {
                        setTime({
                            isTotalDays: true,
                            totalDays: Math.floor(diffMs / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((diffMs / (1000 * 60 * 60)) % 24),
                            minutes: Math.floor((diffMs / (1000 * 60)) % 60),
                            seconds: Math.floor((diffMs / 1000) % 60)
                        });
                    } else {
                        let years = now.getFullYear() - start.getFullYear();
                        let months = now.getMonth() - start.getMonth();
                        let days = now.getDate() - start.getDate();
                        if (days < 0) {
                            months -= 1;
                            const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                            days += lastMonth.getDate();
                        }
                        if (months < 0) {
                            years -= 1;
                            months += 12;
                        }
                        setTime({
                            isTotalDays: false,
                            years,
                            months,
                            days,
                            hours: Math.floor((diffMs / (1000 * 60 * 60)) % 24),
                            minutes: Math.floor((diffMs / (1000 * 60)) % 60),
                            seconds: Math.floor((diffMs / 1000) % 60)
                        });
                    }
                };
                calculate();
                const interval = setInterval(calculate, 1000);
                return () => clearInterval(interval);
            }, [startDate]);

            return (
                <div className="w-full my-6 md:my-10 p-4 md:p-10 bg-white/5 backdrop-blur-xl rounded-[1.5rem] md:rounded-[2.5rem] border border-white/10 shadow-[0_0_50px_rgba(131,11,157,0.15)] text-center relative overflow-hidden group">

                            img.style.transform = `translateY(${offset - 30}px)`;

                    });

                                            <path d="M50 88.932l-5.6-5.1C23.6 64.932 10 52.632 10 38.432c0-11.6 8.8-20.4 20.4-20.4 6.7 0 13.1 3.2 17.2 8.1 4.1-4.9 10.5-8.1 17.2-8.1 11.6 0 20.4 8.8 20.4 20.4 0 14.2-13.6 26.5-34.4 45.4l-5.6 5.1z" strokeLinecap="round" strokeLinejoin="round" />

                                <div className="max-w-4xl mx-auto">

                                    {/* Message 2: Video */}
                                    <div className="bg-white/10 backdrop-blur-md p-8 rounded-[2rem] shadow-2xl border border-pink-500/30 transform hover:scale-[1.02] transition-all duration-500 relative group overflow-hidden max-w-lg mx-auto">
                                        <div className="absolute inset-0 bg-gradient-to-br from-pink-600/10 to-pink-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                        <h3 className="text-2xl font-bold text-pink-200 mb-6 relative z-10">{t.video.title}</h3>
                                        <div className="relative z-10 rounded-xl overflow-hidden shadow-lg">
                                            <video className="w-full" controls id="newVideo" playsInline webkit-playsinline
                                                onPlay={() => {
                                                    if (audioRef.current) {
                                                        audioRef.current.pause();
                                                        setIsPlaying(false);
                                                    }
                                                    // Pause audio message if playing (though unlikely to overlap with native controls)
                                                }}
                                                onPause={() => {
                                                    // Resume music only if audio message is paused (it should be)
                                                    if (audioRef.current && isLogged) {
                                                        audioRef.current.play();
                                                        setIsPlaying(true);
                                                    }
                                                }}
                                                onEnded={() => {
                                                    if (audioRef.current && isLogged) {
                                                        audioRef.current.play();
                                                        setIsPlaying(true);
                                                    }
                                                }}
                                            >
                                                <source src="./Whpp Video 2026-02-11 at 9.35.45 PM.mp4" type="video/mp4" />
                                                Your browser does not support the video tag.
                                            </video>
                                        </div>
                                        <p className="mt-6 text-gray-300 italic relative z-10">"{t.video.sub}"</p>
                                    </div>

                                </div>
                            </section>


                            {/* Reasons Why Section */}
                            <section id="reasons" className="py-16 md:py-24 px-4 relative z-10">
                                <h2 className="text-3xl md:text-4xl font-bold text-center mb-12 md:16 text-[rgb(196,13,116)] font-premium">{t.reasons.title}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 max-w-6xl mx-auto">
                                    {[
                                        t.reasons.r1, t.reasons.r2, t.reasons.r3,
                                        t.reasons.r4, t.reasons.r5, t.reasons.r6
                                    ].map((card, i) => (
                                        <div key={i} className="bg-white/5 p-6 md:p-8 rounded-3xl shadow-xl border border-white/5 hover:-translate-y-2 hover:bg-white/10 transition-all duration-300 group backdrop-blur-sm">
                                            <div className="w-12 h-12 bg-pink-900/50 rounded-full flex items-center justify-center mb-6 group-hover:bg-pink-600 transition-colors border border-pink-500/30">
                                                <Heart className="w-6 h-6 text-pink-400 group-hover:text-white transition-colors" />
                                            </div>
                                            <h3 className="text-2xl font-bold text-pink-100 mb-3">{card.t}</h3>
                                            <p className="text-gray-400 leading-relaxed">{card.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>



                            {/* Counting Section */}
                            <section className="py-24 px-4 relative z-10">
                                <div className="max-w-7xl mx-auto premium-counter rounded-[2rem] md:rounded-[3rem] p-8 md:p-16 text-center border border-white/10 relative overflow-hidden flex flex-col xl:flex-row gap-8 justify-center items-center">
                                    <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_50%_-20%,rgba(196,13,116,0.1),transparent_70%)]"></div>
                                    <RelationshipClock startDate={birthDate} title=<span dangerouslySetInnerHTML={{ __html: t.clock2.title }}></span> subtitle={t.clock2.subtitle} t={t.clock2} format="full" />
                                    <RelationshipClock startDate={firstSightDate} title=<span dangerouslySetInnerHTML={{ __html: t.clock1.title }}></span> subtitle={t.clock1.subtitle} t={t.clock1} format="full" />
                                </div>
                            </section>

                            <footer className="py-16 text-center bg-white/5 backdrop-blur-md border-t border-white/10">
                                <p className="text-2xl font-script text-[rgb(196,13,116)] mb-8">إنتي كل حياتي 💖</p>
                                <button onClick={() => setShowFinalScene(true)}
                                    className="bg-[rgb(196,13,116)] text-white px-8 py-3 rounded-full text-sm hover:bg-black transition-all shadow-lg tracking-widest uppercase font-bold">
                                    {t.footer.final}
                                </button>
                            </footer>

                            <LoveNote lang={lang} />
                        </div>
                    )
                    }
                    {isLogged && <DecorativeFrame />}
                </div >
            );
        }

        function TimeBox({ label, value }) {
            return (
                <div className="bg-white p-6 rounded-2xl shadow-lg border border-pink-100 flex flex-col items-center justify-center aspect-square transform hover:scale-105 transition-transform duration-300">
                    <span className="text-4xl font-bold text-[#830b9d] mb-2">{value || 0}</span>
                    <span className="text-gray-400 text-sm font-medium">{label}</span>
                </div>
            );
        }

        function FinalSceneComponent({ onClose, lang }) {
            const [step, setStep] = useState(0);
            const t = i18n[lang].finalScene;

            useEffect(() => {
                const timeouts = [];
                const schedule = (ms, s) => timeouts.push(setTimeout(() => setStep(s), ms));

                // Timeline matches the user's poetic flow
                schedule(1000, 1);  // Title
                schedule(4000, 2);  // Meaning 1
                schedule(7000, 3);  // Meaning 2
                schedule(10000, 4); // Meaning 3
                schedule(13000, 5); // Stability
                schedule(16000, 6); // Hard times
                schedule(19000, 7); // Heart choice
                schedule(22000, 8); // Always choice

                // Grand Finale
                schedule(26000, 10); // Clear layout
                schedule(27000, 11); // Names
                schedule(30000, 12); // Infinity
                schedule(33000, 13); // English quote
                schedule(38000, 14); // Whisper

                return () => timeouts.forEach(clearTimeout);
            }, []);

            return (
                <div className="fixed inset-0 z-[100] bg-black text-white flex flex-col items-center justify-center text-center p-6 overflow-hidden transition-colors duration-[2s]">
                    {/* Side Controls */}
                    <button onClick={onClose} className="fixed top-6 right-6 z-[110] bg-white/10 backdrop-blur-md border border-white/20 text-white p-3 rounded-full hover:bg-white/30 transition-all group" title="خروج">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>

                    {/* Background Stars */}
                    <div className="absolute inset-0 pointer-events-none opacity-40">
                        {[...Array(30)].map((_, i) => (
                            <div key={i} className="absolute bg-white rounded-full animate-pulse"
                                style={{
                                    width: Math.random() * 3 + 'px',
                                    height: Math.random() * 3 + 'px',
                                    top: Math.random() * 100 + '%',
                                    left: Math.random() * 100 + '%',
                                    animationDuration: Math.random() * 3 + 2 + 's'
                                }}></div>
                        ))}
                    </div>

                    <div className="relative z-10 max-w-4xl w-full flex flex-col items-center justify-center min-h-[60vh]">
                        {step === 1 && (
                            <h1 className="text-3xl xs:text-5xl md:text-7xl font-extrabold text-white drop-shadow-[0_0_15px_rgba(131,11,157,0.8)] animate-slide-up leading-tight px-4" dangerouslySetInnerHTML={{ __html: t.scene1 }}></h1>
                        )}

                        {step >= 2 && step < 10 && (
                            <div className="mt-12 space-y-8">
                                {step >= 2 && <p className="text-2xl text-gray-300 animate-fade-in">{t.scene2} <span className="text-pink-400 font-bold block mt-2 text-3xl">{t.scene2b}</span></p>}
                                {step >= 3 && <p className="text-2xl text-gray-300 animate-fade-in mt-8"><span dangerouslySetInnerHTML={{ __html: t.scene3 }}></span> <span className="text-rose-400 font-bold block mt-2 text-3xl">{t.scene3b}</span></p>}
                                {step >= 5 && <div className="h-px w-24 bg-gray-800 mx-auto my-8 animate-fade-in"></div>}
                                {step >= 6 && <p className="text-xl text-gray-500 italic animate-fade-in">"{t.scene6}"</p>}
                                {step >= 7 && <p className="text-4xl font-bold text-white mt-6 animate-slide-up">{t.scene7}</p>}
                                {step >= 8 && <p className="text-2xl text-pink-300 mt-4 animate-fade-in">{t.scene8}</p>}
                            </div>
                        )}

                        {step >= 11 && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-black animate-fade-in">
                                <h1 className="text-4xl xs:text-6xl md:text-9xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 via-purple-500 to-pink-600 animate-pulse-slow mb-8 px-4">
                                    <span className='font-script text-[rgb(196,13,116)] text-shimmer px-1 font-bold'>شروق</span>
                                </h1>

                                {step >= 12 && (
                                    <div className="flex items-center gap-4 text-3xl text-gray-400 animate-fade-in font-light tracking-wide">
                                        <span><span dangerouslySetInnerHTML={{ __html: t.infinity }}></span></span>
                                        <span className="text-5xl text-[rgb(196,13,116)] animate-spin-slow">∞</span>
                                    </div>
                                )}

                                {step >= 13 && (
                                    <p className="mt-12 text-2xl font-script text-white/60 animate-slide-up"><span className='font-script text-[rgb(196,13,116)] text-shimmer px-1 font-bold'>شروق</span> و بس 💖</p>
                                )}
                            </div>
                        )}

                        {step >= 14 && (
                            <div className="fixed bottom-6 right-6 z-[110] animate-fade-in flex flex-col items-end gap-2">
                                <p className="text-xs text-gray-500 mb-2 mr-2">{t.thanks}</p>
                                <button onClick={onClose} className="bg-white/10 backdrop-blur-md border border-white/20 text-white px-6 py-3 rounded-full hover:bg-white hover:text-black transition-all flex items-center gap-2 group">
                                    <span>{t.back}</span>
                                    <span className="group-hover:-translate-x-1 transition-transform">🏠</span>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<LoveWebsite />);
    </script>
</body>

</html>
